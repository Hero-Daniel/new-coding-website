<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>codingwebsite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
  </head>
  <body>
    <!-- navbar -->
    <nav
      class="flex flex-col md:flex-row items-center justify-between p-5 md:p-7 mx-10 bg-white relative"
    >
      <div class="flex justify-between items-center w-full md:w-auto">
        <h1 class="text-[#2563EB] text-3xl font-bold">CodeCraft Academy</h1>
        <span class="text-3xl cursor-pointer md:hidden block">
          <ion-icon name="menu" id="menuIcon"></ion-icon>
        </span>
      </div>
      <ul
        id="navMenu"
        class="hidden md:flex md:static absolute md:static left-0 top-[-400px] md:top-0 w-full md:w-auto bg-white md:bg-transparent opacity-0 md:opacity-100 transition-all ease-in duration-500"
      >
        <li class="mx-5 my-5 font-semibold text-xl">
          <a href="index.html" class="hover:text-[#2563EB]">Home</a>
        </li>
        <li class="mx-5 my-5">
          <a href="courses.html" class="hover:text-[#2563EB]">Courses</a>
        </li>
        <li class="mx-5 my-5">
          <a href="about.html" class="hover:text-[#2563EB]">About</a>
        </li>
        <li class="mx-5 my-5">
          <a href="#" class="hover:text-[#2563EB]">Testimonials</a>
        </li>
        <li class="mx-5 my-5">
          <a href="#" class="hover:text-[#2563EB]">Blog</a>
        </li>
        <li class="mx-5 my-5">
          <a href="#" class="hover:text-[#2563EB]">Contact</a>
        </li>
      </ul>
    </nav>

    <section class="relative h-[500px] bg-cover bg-center"
    style="background-image: url('/img/16-9_aspect_ratio_luke-peters-rDxfSzXyBqU-unsplash_Cropped_1.jpeg')">
    <div class="absolute inset-0 bg-black/60"></div>

    <div class="relative z-10 flex flex-col md:gap-5 h-full text-white items-center justify-center px-15 w-150">
      <h1 class="text-2xl sm:text-5xl font-bold">
        Tech insights that help you <grow class="text-blue-600">grow</span>
      </h1>
      <p class="mt-3 text-gray-200 max-w-xl">
        Explore tutorials, guides, and real-world insights from developers.
      </p>

      <!-- Search -->
      <input 
        type="text"
        placeholder="Search articles..."
        class="mt-6 w-full max-w-lg px-4 py-3 rounded-xl text-black outline-none"
        style="background-color: white;"
      />
      <ion-icon name="search-outline" class="absolute left-10 bottom-10"></ion-icon>

    </div>
  </section>

    <div
          class="gap-5 flex flex-wrap text-center my-5 md:flex md:gap-4 font-semibold"
        >
          <button class="cursor-pointer hover:text-[#2563EB]" id="all">
            All
          </button>
          <button class="cursor-pointer hover:text-[#2563EB]" id="web-dev">
            Web Development
          </button>
          <button class="cursor-pointer hover:text-[#2563EB]" id="mobile">
            Mobile Development
          </button>
          <button class="cursor-pointer hover:text-[#2563EB]" id="data">
            Data & AI
          </button>
          <button class="cursor-pointer hover:text-[#2563EB]" id="cloud">
            Cloud & Infrastructure
          </button>
          <button class="cursor-pointer hover:text-[#2563EB]" id="design">
            Design
          </button>
        </div>

        <section>
            <div class="container">
                <h1>Latest News</h1>
                <div id="news-container" class="news-grid">
                    <!-- News cards will be loaded here -->
                </div>
            </div>
        </section>
        <script type="module" src="blog.js"></script>
  </body>
</html>
